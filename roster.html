<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Roster - SLO 5x5 Adventure Race</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
   <script>
       tailwind.config = {
           theme: {
               extend: {
                   fontFamily: {
                       oswald: ['Oswald', 'sans-serif'],
                       inter: ['Inter', 'sans-serif'],
                   },
                   colors: {
                       brand: {
                           orange: '#ea580c',
                           dark: '#111827',
                           gray: '#1f2937',
                           light: '#f3f4f6'
                       }
                   }
               }
           }
       }
   </script>
   <style>
       body { font-family: 'Inter', sans-serif; }
       h1, h2, h3, h4, .font-oswald { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
   </style>
</head>
<body class="bg-brand-dark text-brand-light antialiased selection:bg-brand-orange selection:text-white flex flex-col min-h-screen">

   <!-- Navigation -->
   <nav class="fixed w-full z-50 bg-brand-dark border-b border-gray-800">
       <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
           <div class="flex items-center justify-between h-16">
               <div class="flex-shrink-0 font-oswald text-2xl tracking-widest text-white">
                   <a href="index.html">SLO <span class="text-brand-orange">5X5</span></a>
               </div>
               <div class="flex items-center space-x-6">
                   <a href="register.html" class="text-sm font-bold text-gray-400 hover:text-brand-orange transition-colors tracking-widest uppercase">
                       Register
                   </a>
                   <a href="index.html" class="text-sm font-bold text-gray-400 hover:text-white transition-colors tracking-widest uppercase flex items-center">
                       <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                       Back
                   </a>
               </div>
           </div>
       </div>
   </nav>

   <!-- Roster Section -->
   <section class="pt-32 pb-24 bg-brand-dark flex-grow">
       <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
           <div class="text-center mb-12">
               <h2 class="text-4xl md:text-5xl font-bold text-white mb-4">THE FIELD</h2>
               <p class="text-gray-400">These individuals have committed to the suffering. Have you?</p>
           </div>

           <div class="bg-brand-gray p-8 rounded-xl shadow-2xl border border-gray-700 min-h-[300px]">
               <div id="loadingState" class="flex flex-col items-center justify-center py-12">
                   <svg class="animate-spin h-10 w-10 text-brand-orange mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                       <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                       <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                   </svg>
                   <p class="text-gray-400 font-oswald tracking-widest">LOADING ROSTER...</p>
               </div>

               <ul id="rosterList" class="grid grid-cols-1 md:grid-cols-2 gap-4 hidden">
                   <!-- Names will be injected here via JavaScript -->
               </ul>

               <div id="emptyState" class="hidden text-center py-12">
                   <p class="text-xl text-gray-500 font-bold mb-4">The field is currently empty.</p>
                   <a href="register.html" class="inline-block bg-brand-orange hover:bg-orange-500 text-white font-oswald tracking-widest px-6 py-3 rounded-md transition-colors">BE THE FIRST</a>
               </div>
           </div>
       </div>
   </section>

   <!-- Footer -->
   <footer class="bg-black py-10 border-t border-gray-800 mt-auto">
       <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
           <div class="font-oswald text-2xl tracking-widest text-white mb-4">
               SLO <span class="text-brand-orange">5X5</span>
           </div>
           <p class="text-gray-600 text-sm">San Luis Obispo, CA. Seek Discomfort.</p>
       </div>
   </footer>

   <!-- Script to fetch racers on load -->
   <script>
       // Replace this string with the published Google Apps Script URL
       const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwRavnuKNu0FYR4mucFbJ0VGqz_CfoK4ldjUJcJgG7HXJnGIw2Rva0oQ276IHucbKj8/exec";

       document.addEventListener("DOMContentLoaded", function() {
           if (WEB_APP_URL && WEB_APP_URL !== "PASTE_YOUR_DEPLOYED_WEB_APP_URL_HERE") {
               fetch(`${WEB_APP_URL}?path=roster`)
                   .then(response => {
                       if (!response.ok) throw new Error("Network response error");
                       return response.json();
                   })
                   .then(data => {
                       renderRoster(data);
                   })
                   .catch(function(error) {
                       console.error("Failed to load roster:", error);
                       document.getElementById('loadingState').innerHTML = '<p class="text-red-500">Failed to load roster. Please refresh.</p>';
                   });
           } else {
               // Local Mock environment fallback
               setTimeout(() => {
                   renderRoster(['Josh Kunz', 'Craig Test', 'Adventure Racer 1', 'Mountain Biker 2']);
               }, 1000);
           }
       });

       function renderRoster(racers) {
           document.getElementById('loadingState').classList.add('hidden');
          
           if (!racers || racers.length === 0) {
               document.getElementById('emptyState').classList.remove('hidden');
               return;
           }

           const rosterList = document.getElementById('rosterList');
           rosterList.classList.remove('hidden');
          
           racers.forEach((racer, index) => {
               const li = document.createElement('li');
               li.className = 'bg-gray-800 border border-gray-700 p-4 rounded-md flex items-center space-x-4';
               li.innerHTML = `
                   <div class="font-oswald text-brand-orange text-xl opacity-50 font-black w-8 text-right">
                       ${String(index + 1).padStart(2, '0')}
                   </div>
                   <div class="text-white font-bold text-lg">${racer}</div>
               `;
               rosterList.appendChild(li);
           });
       }
   </script>
</body>
</html>
